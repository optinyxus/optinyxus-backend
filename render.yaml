services:
  - type: web
    name: optinyxus-backend
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-app.vercel.app # TODO: Update this to real Vercel domain
      - key: JWT_SECRET
        generateValue: true
